name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build
        env:
          # Placeholder public env so the build doesn't fail on missing vars.
          PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  migrations:
    name: Migrations apply on a fresh Postgres
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # `supabase start` applies every migration in supabase/migrations to a fresh PG17
      # Supabase image. If any migration fails to apply, this step fails the build — the
      # same forward-only validation we run locally. Non-DB services are excluded for speed.
      - run: supabase start -x studio,realtime,storage-api,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor,mailpit
      - name: Lint database schema (informational)
        run: supabase db lint --level warning || true
